# immich values for the homelab.
#
# Chart: immich/immich 0.11.1 (immich v2.6.3) — bjw-s app-template based, so
# env/image/etc. all live under `controllers.main.containers.main.*`.
#
# Public via Cloudflare Tunnel at https://immich.chifor.dev (TLS at CF edge).
# External Postgres: CloudNativePG cluster `immich-postgres` in this namespace
# (pre-applied via apps/manifests/immich-postgres/cluster.yaml — has VectorChord
# + pgvector extensions). Cache: bundled valkey (chart-managed Valkey).

# === Library PVC (chart can't auto-create — pre-existing PVC immich-library) ===
immich:
  persistence:
    library:
      existingClaim: immich-library

# === Cache: Valkey (chart-bundled; replaces the old Redis subchart) ===
valkey:
  enabled: true
  # Use chart defaults — already pinned to docker.io/valkey/valkey:9.1-alpine

# === Server (web + API) ===
server:
  enabled: true
  controllers:
    main:
      containers:
        main:
          env:
            TZ: Europe/Bucharest
            IMMICH_LOG_LEVEL: log
            DB_HOSTNAME: immich-postgres-rw.immich.svc.cluster.local
            DB_PORT: "5432"
            DB_DATABASE_NAME: immich
            DB_VECTOR_EXTENSION: vectorchord
            DB_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-app
                  key: username
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-app
                  key: password

  ingress:
    main:
      enabled: true
      className: cloudflare-tunnel
      hosts:
        - host: immich.chifor.dev
          paths:
            - path: /
              pathType: Prefix
      tls: []

  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { memory: 2Gi }

# === Machine Learning service (face detection, smart search, OCR) ===
machine-learning:
  enabled: true
  controllers:
    main:
      containers:
        main:
          env:
            TZ: Europe/Bucharest
            DB_HOSTNAME: immich-postgres-rw.immich.svc.cluster.local
            DB_PORT: "5432"
            DB_DATABASE_NAME: immich
            DB_VECTOR_EXTENSION: vectorchord
            DB_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-app
                  key: username
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-app
                  key: password

  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits:   { memory: 2Gi }
