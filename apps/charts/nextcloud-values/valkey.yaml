# Standalone Valkey (Redis-compatible) for Nextcloud's distributed memcache
# + transactional file locking. Without this, Nextcloud falls back to the
# database for locking -- visible in admin warnings as
# "Transactional File Locking: The database is used... to enhance
# performance, please configure memcache, if available."
#
# Single pod, no auth (reachable only inside the namespace via ClusterIP),
# no persistence -- cache state is rebuildable. ~64 MB peak for a
# single-user instance.
#
# Apply: kubectl apply -f apps/charts/nextcloud-values/valkey.yaml

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-valkey
  namespace: nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextcloud-valkey
  template:
    metadata:
      labels:
        app: nextcloud-valkey
    spec:
      containers:
        - name: valkey
          image: docker.io/valkey/valkey:9.1-alpine
          args:
            - --save               # disable RDB snapshots (cache is volatile)
            - ""
            - --appendonly
            - "no"                 # no AOF either
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - allkeys-lru          # evict cold keys when full
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 320Mi
          livenessProbe:
            tcpSocket: { port: 6379 }
            periodSeconds: 30
          readinessProbe:
            exec: { command: ["valkey-cli", "ping"] }
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud-valkey
  namespace: nextcloud
spec:
  selector:
    app: nextcloud-valkey
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
