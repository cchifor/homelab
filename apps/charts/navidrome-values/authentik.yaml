# Forward-auth wiring for Navidrome via Authentik's Embedded Outpost.
#
# Three objects:
#   1. Middleware  — Traefik forwardAuth pointing at the embedded outpost
#   2. Service     — ExternalName proxy to authentik-server (cross-ns)
#   3. Ingress     — routes /outpost.goauthentik.io/* on music.chifor.dev
#                    to (2), so the outpost can set its session cookie on
#                    the protected hostname
#
# The chart's `ingress.main` (with the middleware annotation) catches /*,
# the chart's `ingress.subsonic` catches /rest/* and /share/* (NO auth
# middleware so Subsonic clients keep working). Traefik picks the most
# specific path match.

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: navidrome
spec:
  forwardAuth:
    address: http://authentik-server.authentik.svc.cluster.local/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version

---
# ExternalName so the navidrome-namespace Ingress can target authentik-server
# in the authentik namespace (standard Ingress can only reference Services in
# its own namespace; ExternalName is k8s-level CNAME).
apiVersion: v1
kind: Service
metadata:
  name: authentik-server-ref
  namespace: navidrome
spec:
  type: ExternalName
  externalName: authentik-server.authentik.svc.cluster.local
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 9000

---
# Routes /outpost.goauthentik.io/* on music.chifor.dev → authentik-server.
# The outpost intercepts here on first sign-in: redirects to Authentik for
# login, then sets the session cookie on the music.chifor.dev origin so
# subsequent forward-auth checks succeed.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: navidrome-outpost
  namespace: navidrome
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: music.chifor.dev
      http:
        paths:
          - path: /outpost.goauthentik.io
            pathType: Prefix
            backend:
              service:
                name: authentik-server-ref
                port:
                  number: 80
  tls:
    - hosts: [music.chifor.dev]
      secretName: navidrome-tls
