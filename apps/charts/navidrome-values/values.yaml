# navidrome values for the homelab.
#
# Chart: bjw-s/app-template 4.6.2
# Self-hosted Subsonic-compatible music server. LAN-only with LE cert.
# Hostname: music.chifor.dev

# === Controller (Deployment) ===
controllers:
  main:
    type: deployment
    replicas: 1
    strategy: Recreate          # RWO PVCs — only one writer at a time
    containers:
      main:
        image:
          repository: ghcr.io/navidrome/navidrome
          tag: "0.57.0"
        env:
          ND_LOGLEVEL: info
          ND_DATAFOLDER: /data
          ND_MUSICFOLDER: /music
          ND_PORT: "4533"
          # Hide the default invitation to register an account on first run
          # by enabling self-management — set ND_ENABLEUSEREDITING per taste.
          ND_ENABLEUSEREDITING: "true"
          # Subsonic API auth uses unsalted MD5 — fine for personal use, but
          # disable if exposing the server publicly (use plaintext password
          # validation only via the modern web client / app).
          ND_ENABLELEGACYSUBSONICAUTH: "true"
          ND_BASEURL: ""        # served at root

          # Trust X-authentik-username injected by Traefik forward-auth on
          # requests originating from the cluster (i.e. Traefik pods).
          # First user to log in via the proxy header becomes admin.
          ND_REVERSEPROXYUSERHEADER: X-authentik-username
          ND_REVERSEPROXYWHITELIST: "10.42.0.0/16"
        resources:
          requests: { cpu: 50m, memory: 128Mi }
          limits:   { memory: 512Mi }

# Navidrome image runs as uid 1000 by default; fsGroup makes the kubelet
# chgrp the PVCs to gid 1000 on mount so first-launch DB init can write.
# supplementalGroups [33] lets Navidrome read music files Nextcloud writes
# on the shared NFS volume (Nextcloud creates files mode 0640 owned by uid
# 33 / gid 33 = www-data; gid 33 supplementary group lets Navidrome's
# uid 1000 process get past the group-read bit).
defaultPodOptions:
  securityContext:
    fsGroup: 1000
    runAsUser: 1000
    runAsGroup: 1000
    supplementalGroups: [33]
    fsGroupChangePolicy: OnRootMismatch

# === Service ===
service:
  main:
    controller: main
    ports:
      http:
        port: 4533

# === Ingress (LAN-only via Traefik + LE cert) ===
#
# Three Ingress objects share the music.chifor.dev hostname so that Traefik
# can route by path priority:
#   /outpost.goauthentik.io/* → authentik-server (handled by ingress-outpost
#                                                  + ExternalName Service in
#                                                  apps/charts/navidrome-values/authentik.yaml)
#   /rest/*                   → navidrome (subsonic Ingress, NO auth middleware)
#   /*                        → navidrome (main Ingress, with auth middleware)
ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      # Authentik forward-auth via Traefik Middleware in this namespace
      # (defined in authentik.yaml). Annotation reference format is
      # <namespace>-<middleware-name>@kubernetescrd.
      traefik.ingress.kubernetes.io/router.middlewares: navidrome-authentik-forwardauth@kubernetescrd
    hosts:
      - host: music.chifor.dev
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - hosts: [music.chifor.dev]
        secretName: navidrome-tls

  # Subsonic API bypass — Subsonic clients use HTTP-basic / token auth and
  # cannot do the OAuth dance. /rest/* and /share/* go straight to Navidrome
  # without the Authentik middleware, so DSub / play:Sub / Symfonium etc.
  # keep working.
  subsonic:
    enabled: true
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: music.chifor.dev
        paths:
          - path: /rest
            pathType: Prefix
            service:
              identifier: main
              port: http
          - path: /share
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - hosts: [music.chifor.dev]
        secretName: navidrome-tls

# === Storage ===
# data: navidrome's SQLite DB, scrobble cache, transcoded files
# music: the music library — copy your collection in via `kubectl cp`
#        or expose a NAS mount later if the library is large.
persistence:
  data:
    enabled: true
    storageClass: longhorn
    size: 1Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      main:
        main:
          - path: /data
  music:
    enabled: true
    # NFS-backed PVC shared with Nextcloud. Files Nextcloud writes to
    # cloud.chifor.dev/Music/* end up at <NFS root>/data/admin/files/Music
    # on the NAS LXC. Mount that subdirectory only -- Navidrome should NOT
    # see other Nextcloud users / appdata / metadata.
    existingClaim: navidrome-music
    advancedMounts:
      main:
        main:
          - path: /music
            subPath: data/admin/files/Music
            readOnly: true
