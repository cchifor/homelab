# uptime-kuma values for the homelab.
#
# Chart: dirsigler/uptime-kuma 4.1.0 (uptime-kuma 2.3.0)
# LAN-only with LE cert.
# Hostname: uptime.chifor.dev

# === Storage ===
volume:
  enabled: true
  size: 1Gi
  storageClassName: longhorn
  accessMode: ReadWriteOnce

# === Ingress ===
ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: uptime.chifor.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts: [uptime.chifor.dev]
      secretName: uptime-tls

# === Resource limits ===
# UK 2.x ships an embedded MariaDB (~200 MiB InnoDB buffer pool +
# server overhead) on top of the Node process (~120 MiB). The previous
# 256 MiB limit had the pod sitting at 97 % usage steady-state, which
# pushed the bundled `extra/healthcheck` past its liveness-probe
# timeout under any load spike — kubelet then killed and restarted
# the pod (29 restarts in 3 days). 768 MiB leaves comfortable headroom
# for monitor bursts and InnoDB recovery on restart.
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 768Mi

# === Replicas ===
replicaCount: 1

# === Update strategy ===
# Surge MUST be 0. UK 2.x's embedded MariaDB takes an exclusive fcntl
# lock on /app/data/mariadb/ibdata1 + aria_log_control. The chart's
# default RollingUpdate (maxSurge:25%) brings the new pod up while the
# old one is still running; with Longhorn RWO both pods land on the
# same node and can both mount the same volume, so the new pod fails
# its InnoDB plugin init and crashloops until the old pod is deleted.
# We can't use type:Recreate directly — the chart renders a non-null
# rollingUpdate{} block alongside it and k8s rejects that combination.
# maxSurge:0 + maxUnavailable:1 has the same effect (kill old pod
# before starting new) without the schema conflict.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

# === Probes ===
# Liveness probe DISABLED. The chart's bundled `extra/healthcheck`
# binary GETs http://127.0.0.1:3001 and expects an answer within
# `timeoutSeconds`; UK 2.x runs all monitors on Node's single event
# loop, so when 28+ monitors fire their tick simultaneously the HTTP
# server stalls long enough for the probe to time out — even with the
# chart's default 2s, our bumped 10s, or larger thresholds.
# kubelet then SIGKILLs a perfectly healthy pod, MariaDB has to do
# InnoDB recovery, and the cycle repeats (29 restarts in 3 days).
# Readiness probe still removes the pod from the Service endpoints
# if the HTTP server is genuinely down, so we don't lose health
# signaling — we just stop the false-positive auto-restarts.
livenessProbe:
  enabled: false
readinessProbe:
  initialDelaySeconds: 60    # was 10; UK serves only after MariaDB recovery
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 5

# === Service ===
service:
  type: ClusterIP
  port: 3001

# === Pod placement ===
# Pin Kuma to the control-plane VM (k3s-server-01 on the Proxmox host) so
# its PING probes can reach all 4 claude-worker VMs. The VMs use Incus
# macvlan on enp1s0; the kernel L2-isolates macvlan children from their
# parent interface, which means any pod scheduled on rdxaN can't reach
# the claude-worker-N VM that lives on the same host (`Destination Host
# Unreachable`). Other claude-worker VMs are reachable over the LAN. By
# parking Kuma on k3s-server-01 (Proxmox VM, no macvlan kids), every
# claude-worker IP is reachable through the normal LAN router path.
# k3s-server-01 has no control-plane taint so nodeSelector is sufficient;
# no tolerations needed.
nodeSelector:
  kubernetes.io/hostname: k3s-server-01
