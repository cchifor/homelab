# calibre-web-automated values for the homelab.
#
# Chart: bjw-s/app-template 4.6.2
# CWA = Calibre-Web fork that auto-ingests books dropped into a folder
# (auto-converts EPUB/PDF/MOBI/AZW3, fetches metadata, files into the
# library tree). Public via Cloudflare Tunnel at https://books.chifor.dev.
#
# Storage layout (matches Nextcloud's NFS data tree so books appear in
# Nextcloud's Books/ folder for drag-and-drop ingest):
#   /calibre-library  -> NFS subPath data/admin/files/Books/Library
#   /cwa-book-ingest  -> NFS subPath data/admin/files/Books/_ingest
#   /config           -> Longhorn 1 GiB (CWA's SQLite + user DB)
#
# Auth: CWA inherits Calibre-Web's local-user auth -- no native OIDC.
# Authentik integration via forward-auth is deferred (would need same
# Traefik middleware + outpost dance as Navidrome). Initial credential
# is auto-set on first launch -- "admin" / "admin123" -- change immediately
# at /admin/view via the web UI.

controllers:
  main:
    type: deployment
    replicas: 1
    strategy: Recreate    # PVCs RWO -- only one writer
    containers:
      main:
        image:
          repository: crocodilestick/calibre-web-automated
          # Pinned to v4.0.5 (not the latest v4.0.6) because v4.0.6's
          # cps.py is silently killed and respawned by s6-supervise every
          # ~60s. Symptom: "Starting Gevent server" repeats every minute
          # in the pod log; PID changes without an OOM, probe failure, or
          # graceful-shutdown log line. Lands a Cloudflare 502 every time
          # an auth-flow request hits the ~2s restart window. Downgrade
          # to .5 keeps duplicate handling, magic shelves, OAuth fixes
          # introduced in 4.0 — only loses the .6-specific changes.
          tag: v4.0.5
        env:
          PUID: "33"        # match Nextcloud's www-data so file ownership lines up
          PGID: "33"
          TZ: Europe/Bucharest
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits:   { memory: 1Gi }

defaultPodOptions:
  securityContext:
    fsGroup: 33
    fsGroupChangePolicy: OnRootMismatch
    # NB: NO runAsUser/runAsGroup -- crocodilestick/calibre-web-automated
    # is an LSIO-style image; s6-overlay's init scripts must run as root
    # to chown the data dirs, then drop to PUID:PGID (33:33) for the
    # actual app process. Forcing runAsUser: 33 makes init-adduser fail
    # with "Permission denied" on /usr/bin/lsiown and the container
    # never starts the http listener.

service:
  main:
    controller: main
    ports:
      http:
        port: 8083

# Public access pattern (mirrors Navidrome):
#   - public-tunnel.yaml: cloudflare-tunnel Ingress in kube-system at /
#     points the tunnel at Traefik svc so middlewares can run
#   - this chart's `main` Ingress: traefik class with Authentik forward-auth
#     middleware -- catches /* (web UI), gated by SSO
#   - this chart's `opds` Ingress: traefik class WITHOUT middleware --
#     catches /opds*, /download/*, /api/v1/* so OPDS clients (KyBook,
#     Marvin, Aldiko) and CalibreSync keep working with HTTP-basic. They
#     can't follow a forward-auth redirect to Authentik.
#   - authentik.yaml: Middleware definition + ExternalName + outpost Ingress
ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: cwa-authentik-forwardauth@kubernetescrd
    hosts:
      - host: books.chifor.dev
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls: []   # CF Tunnel terminates TLS; in-cluster hop is plain HTTP

  # OPDS / download / API path bypass -- no middleware, HTTP-basic against
  # CWA's local user table is the auth.
  opds:
    enabled: true
    className: traefik
    annotations: {}
    hosts:
      - host: books.chifor.dev
        paths:
          - path: /opds
            pathType: Prefix
            service:
              identifier: main
              port: http
          - path: /download
            pathType: Prefix
            service:
              identifier: main
              port: http
          - path: /api/v1
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls: []

persistence:
  config:
    enabled: true
    storageClass: longhorn
    size: 1Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      main:
        main:
          - path: /config

  # Same NFS PVC, two distinct subPath mounts -- bjw-s lets us list multiple
  # mount entries under a single persistence block to avoid claiming the
  # same PVC twice.
  books-nfs:
    enabled: true
    existingClaim: cwa-books
    advancedMounts:
      main:
        main:
          - path: /calibre-library
            subPath: data/admin/files/Books/Library
          - path: /cwa-book-ingest
            subPath: data/admin/files/Books/_ingest
