# Tell the kube-prometheus-stack Prometheus to scrape Longhorn's
# manager-side metrics on port 9500 of `longhorn-backend`.
# Apply: kubectl apply -f apps/manifests/servicemonitors/longhorn.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: longhorn
  namespace: longhorn-system
  labels:
    # The kube-prometheus-stack Prometheus selector includes
    # `release: kube-prometheus-stack`; without this label the
    # ServiceMonitor is created but never scraped.
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: longhorn-manager
  endpoints:
    - port: manager
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames: [longhorn-system]
