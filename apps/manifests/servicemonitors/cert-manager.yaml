# Scrape cert-manager's metrics endpoint on port 9402.
# Apply: kubectl apply -f apps/manifests/servicemonitors/cert-manager.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cert-manager
  namespace: cert-manager
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cert-manager
      app.kubernetes.io/component: controller
  endpoints:
    - port: tcp-prometheus-servicemonitor
      path: /metrics
      interval: 60s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames: [cert-manager]
