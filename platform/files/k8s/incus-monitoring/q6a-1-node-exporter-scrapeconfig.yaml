# Scrape config for the standalone node-exporter on q6a-1.
#
# q6a-1 is the Incus-only hypervisor (no k3s-agent), so the
# kube-prometheus-stack node-exporter DaemonSet doesn't reach it.
# This adds it as a static scrape target so host CPU/memory/disk/network
# show up in Prometheus alongside the q6a-2/3/4 daemonset targets.

apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: q6a-1-node-exporter
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  jobName: q6a-1-node-exporter
  scheme: HTTP
  metricsPath: /metrics
  scrapeInterval: 30s
  staticConfigs:
    - targets:
        - 192.168.0.174:9100
      labels:
        cluster: home-lab
        incus_node: q6a-1
        job: node-exporter   # match the daemonset's job label for uniform queries
