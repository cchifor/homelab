# Preseed for Q6A workers that ALSO run k3s on bare metal.
#
# Storage: dir-backed under /var/lib/incus (shares the ext4 root with k3s).
# Network: macvlan child on enp1s0 (same physical NIC as flannel's VXLAN
#          transport; different L2 entities, coexist cleanly because the
#          host IP stays bound to enp1s0 and macvlan children get their
#          own MAC + LAN IP).
# API:     HTTPS on [::]:8443 for the web UI from the operator workstation.
#
# Applied by platform/scripts/prep-worker-incus.sh via:
#   incus admin init --preseed < preseed-worker.yaml
#
# This is the "Incus alongside k3s" variant — minimal, dormant standby
# capacity, no VMs running by default. The dedicated-hypervisor variant
# (used on q6a-1, which hosts claude-worker-2) is platform/files/incus/preseed.yaml.

config:
  core.https_address: "[::]:8443"
storage_pools:
  - name: default
    driver: dir
    config:
      source: /var/lib/incus/storage-pools/default
networks: []
profiles:
  - name: default
    description: "Default profile: dir storage + macvlan NIC on enp1s0"
    devices:
      eth0:
        type: nic
        nictype: macvlan
        parent: enp1s0
      root:
        type: disk
        path: /
        pool: default
projects: []
cluster: null
