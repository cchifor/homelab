# Incus init preseed — standalone (non-cluster) variant, retained for reference.
#
# The home-lab actually runs Incus in CLUSTER mode across rdxa1..rdxa4 since
# 2026-05-19 (rebuild after a cert/raft state corruption following hostname/IP
# renumbering — see ../../docs/PLAN.md). The cluster was reformed by hand on
# rdxa1 with `incus admin init --preseed` + `cluster.enabled=true`, then
# rdxa2/3/4 joined via tokens. See README.md "Rebuilding the Incus cluster"
# for the live procedure.
#
# Use preseed-worker.yaml for the same shape applied via the orchestrator
# scripts/install-incus-workers.sh — that variant runs alongside k3s and is
# what we deploy when reflashing a node.
#
# Apply on the host (Armbian/Debian, after UEFI Hypervisor Override —
# F2 → Hypervisor Settings → Hypervisor Override → enable → save):
#   sudo apt install -y incus incus-ui-canonical qemu-system-arm qemu-utils bridge-utils
#   sudo incus admin init --preseed < /path/to/preseed.yaml
#
# Web UI is then reachable at https://<node-ip>:8443. OIDC against Authentik
# was added post-init via `incus config set oidc.issuer ...` +
# `oidc.client.id ...` (not preseeded — requires the Authentik client first).

config:
  core.https_address: "[::]:8443"

storage_pools:
  - name: default
    driver: dir
    config:
      source: /var/lib/incus/storage-pools/default

networks: []

profiles:
  - name: default
    description: "Default profile: dir storage + macvlan NIC on enp1s0"
    devices:
      root:
        type: disk
        path: /
        pool: default
      eth0:
        type: nic
        nictype: macvlan
        parent: enp1s0

projects: []
cluster: null
