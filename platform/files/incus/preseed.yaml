# Incus init preseed for the q6a-1 hypervisor host.
# Usage on the host (Radxa OS, after rsetup-enabled KVM):
#
#   sudo apt install -y incus incus-ui-canonical qemu-system-arm qemu-utils bridge-utils
#   sudo incus admin init --preseed < /path/to/preseed.yaml
#
# Before piping it in, REPLACE the two <…> placeholders below:
#   <ZFS_POOL_SOURCE>  → e.g. /dev/nvme0n1p3  (an unformatted partition; resize
#                        nvme0n1p2 down first with parted/gparted to leave free
#                        space, then `parted /dev/nvme0n1 mkpart primary <start> <end>`)
#   <LAN_PARENT_IFACE> → name of the host's LAN NIC (run `ip -br link` on q6a-1;
#                        common names: eth0, end0, enP3s0, enp1s0)
#
# Server: bind the HTTPS API on all interfaces so the web UI is reachable from
# the operator workstation at https://192.168.0.174:8443. Trust password is set
# interactively after init via `incus config trust add` (preferred over storing
# a password in this file).

config:
  core.https_address: "[::]:8443"

storage_pools:
  - name: default
    driver: zfs
    config:
      source: <ZFS_POOL_SOURCE>
      zfs.pool_name: incus

networks: []

profiles:
  - name: default
    description: "Default profile: root disk on ZFS, macvlan NIC bridged to LAN"
    devices:
      root:
        type: disk
        path: /
        pool: default
      eth0:
        type: nic
        nictype: macvlan
        parent: <LAN_PARENT_IFACE>

projects: []
cluster: null
