# Incus init preseed for the q6a-1 dedicated hypervisor host (192.168.0.174).
#
# This is the AS-DEPLOYED config on q6a-1. The 2026-05-03 plan called for
# ZFS storage on a dedicated partition and a Radxa-OS reflash — neither
# happened. q6a-1 runs Armbian with Incus 7.0 on dir-backed storage in the
# existing ext4 root, and KVM is enabled via the Qualcomm UEFI Setup:
#   F2 during boot splash → Hypervisor Settings → Hypervisor Override →
#   enable → save & exit. Setting persists in UEFI NVRAM across OS
#   reinstalls, so the same Q6A board needs this toggled exactly once.
#
# For Q6A workers that ALSO run k3s on bare metal (q6a-2/3/4), use
# preseed-worker.yaml — same shape, scoped for dormant standby capacity.
#
# Apply on the host (Armbian/Debian, after UEFI Hypervisor Override):
#   sudo apt install -y incus incus-ui-canonical qemu-system-arm qemu-utils bridge-utils
#   sudo incus admin init --preseed < /path/to/preseed.yaml
#
# Then the web UI is reachable from the operator workstation at
# https://192.168.0.174:8443. Optional Authentik OIDC integration was added
# post-init via `incus config set oidc.issuer ...` + `oidc.client.id ...`
# (not preseeded — would require the Authentik client to exist first).

config:
  core.https_address: "[::]:8443"

storage_pools:
  - name: default
    driver: dir
    config:
      source: /var/lib/incus/storage-pools/default

networks: []

profiles:
  - name: default
    description: "Default profile: dir storage + macvlan NIC on enp1s0"
    devices:
      root:
        type: disk
        path: /
        pool: default
      eth0:
        type: nic
        nictype: macvlan
        parent: enp1s0

projects: []
cluster: null
