# Cloud-init Network Config v2 for claude-worker-4.
# Static IP 192.168.0.144 — claude-worker-N maps to .14N in the unified scheme.

version: 2
ethernets:
  primary:
    match:
      driver: virtio_net
    set-name: enp5s0
    dhcp4: false
    addresses:
      - 192.168.0.144/23
    gateway4: 192.168.0.1
    nameservers:
      addresses:
        - 1.1.1.1
        - 192.168.0.1
