#!/usr/bin/env bash
# scripts/cluster.conf
#
# Shared topology + auth defaults for the operator-side scripts.
# Sourced by deploy-prep.sh and check-prereqs.sh — the single edit point for
# cluster IPs, SSH user, and SSH key paths.
#
# Override semantics (highest precedence first):
#   1. CLI flags on the script (e.g. --worker-user, --ssh-key)
#   2. Env vars set in the shell before invocation
#   3. Defaults in this file
#
# These values also flow into terraform.tfvars when check-prereqs.sh generates
# it on first run. The matching defaults in variables.tf are starter examples
# only — the operational source of truth is THIS FILE.
#
# Not sourced by prep-proxmox.sh / prep-worker.sh — those are shipped to
# remote hosts (via stdin or scp) and run self-contained.

# ----------------------------------------------------------------------------
# Proxmox host
# ----------------------------------------------------------------------------
PROXMOX_HOST="${PROXMOX_HOST:-192.168.0.185}"
PROXMOX_USER="${PROXMOX_USER:-root}"

# ----------------------------------------------------------------------------
# Operator SSH (used to reach Proxmox + workers from this machine)
# ----------------------------------------------------------------------------
SSH_KEY_PATH="${SSH_KEY_PATH:-$HOME/.ssh/id_ed25519}"
SSH_PUBLIC_KEY_PATH="${SSH_PUBLIC_KEY_PATH:-$HOME/.ssh/id_ed25519.pub}"

# ----------------------------------------------------------------------------
# Radxa Q6A workers (NAME=ADDRESS, one per line)
#
# Unified naming + IP scheme since 2026-05-19: rdxa{1..4} at .131-.134 on the
# 192.168.0.0/23 LAN. Each host runs both k3s-agent and Incus (4-node Incus
# cluster); claude-workerN VMs (when present) live in Incus at .141-.144.
# ----------------------------------------------------------------------------
WORKERS_DEFAULT='rdxa1=192.168.0.131
rdxa2=192.168.0.132
rdxa3=192.168.0.133
rdxa4=192.168.0.134'
WORKERS="${WORKERS:-$WORKERS_DEFAULT}"
WORKER_USER="${WORKER_USER:-c4}"

# ----------------------------------------------------------------------------
# Proxmox API token ID (the user@realm!tokenid form, NOT the secret).
# The secret lives in .env (or shell) as $TF_VAR_pm_api_token_secret.
# ----------------------------------------------------------------------------
TOFU_TOKEN_ID_HINT="${TOFU_TOKEN_ID_HINT:-tofu-prov@pve!tofu-token}"
