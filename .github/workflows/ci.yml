name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: terraform fmt + validate (platform/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          # Pinned to match the version that produced .terraform.lock.hcl.
          terraform_version: 1.14.7

      - name: terraform fmt -check (recursive)
        run: terraform fmt -check -recursive -diff

      - name: terraform init (providers only, no backend)
        # -backend=false skips backend init; providers come from the lockfile.
        # No real cluster contacted — this is a syntax/schema check only.
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate

  scripts:
    name: bash syntax check (platform/scripts/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: bash -n on every script
        run: |
          fail=0
          for f in platform/scripts/*.sh; do
            echo "::group::$f"
            if bash -n "$f"; then
              echo "  OK"
            else
              echo "::error file=$f::bash syntax error"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"

  helm:
    name: helm lint (apps/charts/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: helm lint each chart
        run: |
          shopt -s nullglob
          charts=(apps/charts/*/)
          if [ ${#charts[@]} -eq 0 ]; then
            echo "No charts in apps/charts/ yet — skipping."
            exit 0
          fi
          fail=0
          for chart in "${charts[@]}"; do
            echo "::group::helm lint $chart"
            if helm lint "$chart"; then
              echo "  OK"
            else
              echo "::error file=$chart::helm lint failed"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"

      - name: helm template each chart (catches render-time errors lint misses)
        run: |
          shopt -s nullglob
          for chart in apps/charts/*/; do
            echo "::group::helm template $chart"
            helm template "$chart" >/dev/null && echo "  OK"
            echo "::endgroup::"
          done

  manifests:
    name: kubectl validate (apps/manifests/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          # Match the cluster's k3s 1.30.x server.
          version: v1.30.10

      - name: kubectl client-side validate
        run: |
          shopt -s nullglob
          manifests=(apps/manifests/*/*.yaml)
          if [ ${#manifests[@]} -eq 0 ]; then
            echo "No manifests in apps/manifests/ yet — skipping."
            exit 0
          fi
          fail=0
          for f in "${manifests[@]}"; do
            echo "::group::kubectl --dry-run=client apply -f $f"
            if kubectl --dry-run=client -o yaml apply -f "$f" >/dev/null; then
              echo "  OK"
            else
              echo "::error file=$f::kubectl client validation failed"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"
